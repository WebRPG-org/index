name: Prepare fork repositories

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Fork listed repositories
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: prepare-fork-repos
  cancel-in-progress: false

jobs:
  plan:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
      target_count: ${{ steps.plan.outputs.target_count }}
    steps:
      - name: Check out index
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: WebRPG-org

      - name: Plan fork repositories
        id: plan
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: WebRPG-org
          LIMIT: "0"
        run: node scripts/plan-fork-repos.mjs

  process:
    needs: plan
    if: needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Check out index
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create repository-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: WebRPG-org
          repositories: ${{ matrix.repo }}

      - name: Inject analytics script and enable Pages
        env:
          WEBRPG_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: WebRPG-org
          REPO_NAME: ${{ matrix.repo }}
          DRY_RUN: "false"
          DELETE_INVALID_REPOS: "true"
          PAGES_SOURCE_PATH: /
          SITE_ORIGIN: https://webrpg.org
          RESULT_DIR: workflow-results
        run: node scripts/process-fork-repo.mjs

      - name: Upload repository result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.repo }}
          path: workflow-results/*.json
          if-no-files-found: warn

  aggregate:
    needs:
      - plan
      - process
    if: always() && needs.plan.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create index repository token
        id: index-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WEBRPG_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEBRPG_APP_PRIVATE_KEY }}
          owner: WebRPG-org
          repositories: index

      - name: Check out index
        uses: actions/checkout@v4
        with:
          token: ${{ steps.index-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download repository results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: workflow-results

      - name: Update list metadata
        env:
          DRY_RUN: "false"
          RESULTS_DIR: workflow-results
        run: node scripts/update-list-from-results.mjs

      - name: Commit list metadata
        run: |
          git config user.name "webrpg-bot[bot]"
          git config user.email "webrpg-bot[bot]@users.noreply.github.com"
          git add list.json
          if git diff --cached --quiet; then
            echo "No list.json changes to commit."
          else
            git commit -m "Update fork validation metadata"
            git push
          fi
