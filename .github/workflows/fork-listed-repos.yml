name: Fork listed repositories

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Index GitHub RPG Maker repositories
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: fork-listed-repos
  cancel-in-progress: false

jobs:
  fork:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out index
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fork repositories
        continue-on-error: true
        env:
          WEBRPG_FORK_TOKEN: ${{ secrets.WEBRPG_FORK_TOKEN }}
          TARGET_ORG: WebRPG-org
          DRY_RUN: "false"
          LIMIT: "0"
          DEFAULT_BRANCH_ONLY: "false"
          INCLUDE_INVALID: "false"
          CREATE_DELAY_SECONDS: "3"
          RETRY_LIMIT: "5"
          RETRY_BASE_DELAY_SECONDS: "60"
        run: node scripts/fork-listed-repos.mjs
